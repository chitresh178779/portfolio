<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; font-size: 2rem; }
  main { position: relative; }
  .sec { padding: 2rem; }
  .s1 { height: 150vh; background: red; position: sticky; bottom: 0; z-index: 10; border-top-left-radius: 4rem; border-top-right-radius: 4rem; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); margin-top: -4rem;}
  .s2 { height: 120vh; background: blue; position: sticky; bottom: 0; z-index: 20; border-top-left-radius: 4rem; border-top-right-radius: 4rem; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
  .s3 { height: 180vh; background: green; position: sticky; bottom: 0; z-index: 30; border-top-left-radius: 4rem; border-top-right-radius: 4rem; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
</style>
</head>
<body>
  <div style="height: 100vh; position: sticky; top: 0; background: purple; z-index: 0;">HERO</div>
  <main>
    <div class="sec s1">Section 1 (150vh) - Sticky Bottom</div>
    <div class="sec s2">Section 2 (120vh) - Sticky Bottom</div>
    <div class="sec s3">Section 3 (180vh) - Sticky Bottom</div>
  </main>
</body>
</html>
